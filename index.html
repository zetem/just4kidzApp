<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>just4kidz — Discover near Westboro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --coral-500:#F4612E;--coral-t:#FFF1EC;
  --green-500:#1F9E5A;--green-50:#E9F8EF;--green-700:#13693C;
  --amber-500:#E89110;--amber-50:#FFF6E5;--amber-700:#985A0A;
  --sky-400:#2E9BC9;
  --sand-50:#FFFBF6;--sand-100:#FBF4EA;--sand-200:#F3E9DA;--sand-300:#E9DBC8;--sand-400:#D8C7B0;
  --ink-900:#241D18;--ink-800:#332A23;--ink-600:#6B5D51;--ink-500:#8A7B6E;--ink-400:#A99B8E;
  --white:#fff;
  --color-primary:#FB8B3D;--color-primary-hover:#F07A26;--color-primary-press:#DA6817;
  --color-primary-soft:#FFE3CB;--color-primary-tint:#FFF5EC;
  --bg-app:var(--sand-50);--bg-subtle:var(--sand-100);
  --surface-card:var(--white);
  --border-subtle:var(--sand-200);--border-default:var(--sand-300);
  --text-strong:var(--ink-900);--text-body:var(--ink-800);
  --text-muted:var(--ink-600);--text-subtle:var(--ink-500);--text-link:#E07418;
  --avail-open-fg:var(--green-700);--avail-open-bg:var(--green-50);--avail-open-dot:var(--green-500);
  --avail-filling-fg:var(--amber-700);--avail-filling-bg:var(--amber-50);--avail-filling-dot:var(--amber-500);
  --avail-full-fg:var(--ink-600);--avail-full-bg:var(--sand-200);--avail-full-dot:var(--ink-400);
  --cat-sports:#F4612E;--cat-arts:#9B5DE5;--cat-music:#E0559B;
  --cat-outdoor:#1F9E5A;--cat-learn:#E89110;--cat-water:#2BB7C4;
  --radius-xs:6px;--radius-sm:10px;--radius-md:14px;--radius-lg:18px;
  --radius-pill:999px;--radius-card:20px;
  --shadow-xs:0 1px 2px rgba(74,47,24,.06);
  --shadow-sm:0 1px 3px rgba(74,47,24,.08),0 1px 2px rgba(74,47,24,.05);
  --shadow-md:0 4px 12px rgba(74,47,24,.10),0 2px 4px rgba(74,47,24,.06);
  --shadow-lg:0 12px 28px rgba(74,47,24,.14),0 4px 10px rgba(74,47,24,.07);
  --shadow-xl:0 24px 48px rgba(74,47,24,.18),0 8px 16px rgba(74,47,24,.08);
  --shadow-primary:0 6px 16px rgba(251,139,61,.34);
  --dur-fast:130ms;--dur-base:200ms;
  --ease-out:cubic-bezier(.22,1,.36,1);--ease-spring:cubic-bezier(.34,1.56,.64,1);
  --font-sans:"Plus Jakarta Sans",ui-sans-serif,system-ui,sans-serif;
  --font-mono:"DM Mono",ui-monospace,"SF Mono",monospace;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
html{overflow-x:auto}
body{font-family:var(--font-sans);font-size:15px;line-height:1.45;color:var(--text-body);background:var(--sand-200);-webkit-font-smoothing:antialiased;display:flex;align-items:flex-start;justify-content:center;padding:24px;min-height:100vh;min-width:fit-content}
h1,h2,h3,h4,h5,h6,p{margin:0}
button{font-family:var(--font-sans);cursor:pointer}
:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(61,116,232,.3)}
.results-list{scrollbar-width:thin;scrollbar-color:var(--sand-300) transparent}
.results-list::-webkit-scrollbar{display:block;width:4px}
.results-list::-webkit-scrollbar-thumb{background:var(--sand-300);border-radius:4px}

#root{display:flex;width:1440px;height:900px;flex-shrink:0}
.app{display:flex;width:100%;height:100%;background:var(--bg-app);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-xl)}

/* sidebar */
.sidenav{flex:none;background:var(--surface-card);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;overflow:hidden;transition:width var(--dur-base) var(--ease-out),padding var(--dur-base) var(--ease-out)}
.sidenav.expanded{width:248px;padding:22px 16px}
.sidenav.collapsed{width:76px;padding:22px 12px}
.nav-header{display:flex;align-items:center;margin-bottom:22px}
.sidenav.expanded .nav-header{justify-content:space-between;padding-left:8px}
.sidenav.collapsed .nav-header{justify-content:center;flex-direction:column;gap:12px}
.toggle-btn{width:28px;height:28px;flex:none;border-radius:50%;border:1px solid var(--border-default);background:var(--surface-card);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;line-height:1;box-shadow:var(--shadow-xs)}
.toggle-btn:hover{background:var(--bg-subtle)}
.nav-items{display:flex;flex-direction:column;gap:4px}
.nav-btn{display:flex;align-items:center;gap:12px;border:none;border-radius:var(--radius-md);font-size:14.5px;font-weight:700;white-space:nowrap;transition:background var(--dur-fast),color var(--dur-fast)}
.sidenav.expanded .nav-btn{padding:11px 12px;width:100%;justify-content:flex-start}
.sidenav.collapsed .nav-btn{padding:11px 0;width:100%;justify-content:center}
.nav-btn.active{background:var(--color-primary-tint);color:var(--color-primary-press)}
.nav-btn:not(.active){background:transparent;color:var(--text-muted)}
.nav-btn:not(.active):hover{background:var(--bg-subtle)}
.friends-box{padding:12px;background:var(--bg-subtle);border-radius:var(--radius-lg)}
.friends-label{font-size:11.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:10px}
.friends-row{display:flex;align-items:center}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex:none}
.avatar-sm{width:32px;height:32px;font-size:12px;border:2px solid #fff}
.avatar-md{width:40px;height:40px;font-size:15px}

/* main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.app-header{display:flex;align-items:center;gap:16px;padding:18px 28px;border-bottom:1px solid var(--border-subtle);background:var(--bg-app);flex:none}
.header-title{font-size:20px;font-weight:800;letter-spacing:-.01em;color:var(--text-strong)}
.header-sub{font-size:13px;font-weight:600;color:var(--text-muted);margin-top:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.search-bar{display:flex;align-items:center;gap:9px;height:44px;padding:0 16px;background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-pill);width:260px;box-shadow:var(--shadow-xs)}
.search-bar span{font-size:14px;font-weight:600;color:var(--text-subtle)}
.btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:var(--radius-pill);font-weight:700;cursor:pointer;transition:background var(--dur-fast),transform var(--dur-fast) var(--ease-spring)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--color-primary);color:#fff;padding:0 18px;height:40px;font-size:14px;box-shadow:var(--shadow-primary);font-family:var(--font-sans)}
.btn-primary:hover{background:var(--color-primary-hover)}
.btn-sm{height:34px;padding:0 14px;font-size:13px;font-family:var(--font-sans)}
.btn-full{width:100%;justify-content:center}
.btn-surface{background:var(--surface-card);color:var(--text-body);border:1.5px solid var(--border-default);box-shadow:var(--shadow-xs);width:44px;height:44px;border-radius:var(--radius-md);padding:0;display:flex;align-items:center;justify-content:center}
.btn-surface:hover{background:var(--bg-subtle)}
.btn-soft{background:var(--color-primary-soft);color:var(--color-primary-press);width:34px;height:34px;border-radius:var(--radius-md);padding:0;display:flex;align-items:center;justify-content:center;border:none}
.btn-soft:hover{background:var(--color-primary-tint)}

/* body */
.body{flex:1;display:flex;min-height:0}

/* results */
.results-panel{width:424px;flex:none;border-right:1px solid var(--border-subtle);background:var(--bg-app);display:flex;flex-direction:column;min-height:0}
.results-header{display:flex;align-items:center;padding:16px 20px 12px;flex:none}
.results-count{font-size:16px;font-weight:800;color:var(--text-strong)}
.sort-btn{margin-left:auto;font-size:13px;font-weight:700;color:var(--text-link);background:none;border:none;font-family:var(--font-sans)}
.results-list{flex:1;overflow-y:auto;padding:0 20px 20px;display:flex;flex-direction:column;gap:12px}
.activity-card{background:var(--surface-card);border-radius:var(--radius-card);padding:14px;cursor:pointer;border:2.5px solid transparent;box-shadow:var(--shadow-sm);transition:box-shadow var(--dur-base) var(--ease-out),border-color var(--dur-base),transform var(--dur-fast) var(--ease-spring)}
.activity-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.activity-card.selected{border-color:var(--color-primary)}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cat-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px 3px 5px;border-radius:var(--radius-pill);font-size:11.5px;font-weight:700}
.avail-pill{margin-left:auto;display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--radius-pill);font-size:11.5px;font-weight:700}
.avail-dot{width:7px;height:7px;border-radius:50%;flex:none}
.card-title{font-size:15px;font-weight:800;color:var(--text-strong);line-height:1.2;margin-bottom:5px}
.card-meta{display:flex;flex-wrap:wrap;align-items:center;gap:10px;font-size:12.5px;font-weight:600;color:var(--text-muted)}
.meta-item{display:inline-flex;align-items:center;gap:4px}
.card-price{margin-left:auto;font-family:var(--font-mono);font-weight:500;font-size:15px;color:var(--text-strong)}

/* modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(36,29,24,.45);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn var(--dur-base) var(--ease-out)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface-card);border-radius:var(--radius-card);box-shadow:var(--shadow-xl);width:520px;max-width:calc(100vw - 48px);max-height:calc(100vh - 80px);overflow-y:auto;animation:slideUp var(--dur-base) var(--ease-out)}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 0}
.modal-title{font-size:19px;font-weight:800;letter-spacing:-.01em;color:var(--text-strong)}
.modal-close{width:32px;height:32px;border:none;background:var(--bg-subtle);border-radius:50%;font-size:18px;font-weight:700;color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.modal-close:hover{background:var(--sand-200)}
.modal-body{padding:20px 24px 24px;display:flex;flex-direction:column;gap:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12.5px;font-weight:700;color:var(--text-muted);letter-spacing:.02em}
.field input,.field select{height:42px;border:1.5px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-subtle);font-family:var(--font-sans);font-size:14px;font-weight:500;color:var(--text-strong);padding:0 13px;transition:border-color var(--dur-fast),box-shadow var(--dur-fast)}
.field input:focus,.field select:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(251,139,61,.18)}
.field input::placeholder{color:var(--text-subtle)}
.modal-footer{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:0 24px 24px}
.btn-ghost{background:none;border:1.5px solid var(--border-default);color:var(--text-muted);height:40px;padding:0 18px;border-radius:var(--radius-pill);font-size:14px;font-weight:700;font-family:var(--font-sans);cursor:pointer}
.btn-ghost:hover{background:var(--bg-subtle)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink-900);color:#fff;border-radius:var(--radius-pill);padding:10px 20px;font-size:14px;font-weight:700;box-shadow:var(--shadow-lg);z-index:200;animation:toastIn .22s var(--ease-out)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* map */
.map-pane{flex:1;position:relative;min-width:0;overflow:hidden}
.map-chips{position:absolute;top:16px;left:16px;right:16px;display:flex;gap:8px;flex-wrap:wrap;z-index:10}
.filter-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 14px 7px 10px;border-radius:var(--radius-pill);border:1.5px solid var(--border-default);background:var(--surface-card);color:var(--text-muted);font-size:13px;font-weight:700;box-shadow:var(--shadow-xs);transition:background var(--dur-fast),color var(--dur-fast),border-color var(--dur-fast);font-family:var(--font-sans)}
.filter-chip:hover{box-shadow:var(--shadow-sm)}
.filter-chip.active{background:var(--color-primary);color:#fff;border-color:transparent;box-shadow:var(--shadow-primary)}
.map-locate{position:absolute;right:18px;bottom:18px;z-index:10}
.map-popover{position:absolute;left:18px;bottom:18px;width:340px;background:var(--surface-card);border-radius:var(--radius-card);box-shadow:var(--shadow-xl);border:1px solid var(--border-subtle);padding:16px;z-index:20;animation:popIn var(--dur-base) var(--ease-out)}
@keyframes popIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pop-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pop-title{font-size:18px;font-weight:800;letter-spacing:-.01em;color:var(--text-strong);line-height:1.2}
.pop-loc{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:13px;font-weight:600;color:var(--text-muted)}
.pop-meta{display:flex;align-items:center;gap:14px;margin-top:8px;font-size:12.5px;font-weight:600;color:var(--text-muted)}
.pop-actions{display:flex;gap:10px;margin-top:14px}
</style>

    'map-pin':  `<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>`,
    clock:      `<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>`,
    heart:      `<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>`,
    navigation: `<polygon points="3 11 22 2 13 21 11 13 3 11"/>`,
  };
  const inner = icons[name] || "";
  return h("svg", {
    ...svgAttrs(size, sw, color),
    dangerouslySetInnerHTML: { __html: inner },
  });
}

// ── Small UI components ───────────────────────────────────────────────────────
function Avatar({ name, size = "sm" }) {
  return h("div", {
    className: `avatar avatar-${size}`,
    style: { background: avatarBg(name) },
    title: name,
  }, initials(name));
}

function AvailPill({ status, spotsLeft }) {
  const { fg, bg, dot, label } = availCfg(status);
  const extra = status === "filling" ? ` · ${spotsLeft} left` : "";
  return h("span", { className:"avail-pill", style:{ color:fg, background:bg } },
    h("span", { className:"avail-dot", style:{ background:dot } }),
    label + extra
  );
}

function CatTag({ category }) {
  const color = CAT_COLOR[category] || "var(--text-muted)";
  return h("span", {
    className: "cat-tag",
    style: { background: color + "1a", color },
  },
    h(Icon, { name: { sports:"activity", arts:"palette", music:"music", outdoor:"leaf", water:"droplet", learn:"check" }[category] || "check", size:13, sw:2.4, color }),
    CAT_LABEL[category] || category
  );
}

// ── Logos ─────────────────────────────────────────────────────────────────────
function LogoLockup() {
  return h("svg", { width:160, height:40, viewBox:"0 0 320 80", fill:"none", "aria-label":"just4kidz" },
    h("rect", { x:8, y:8, width:64, height:64, rx:18, fill:"#FB8B3D" }),
    h("circle", { cx:30, cy:33, r:9, fill:"#fff" }),
    h("circle", { cx:45, cy:43, r:6.6, fill:"#F6A623" }),
    h("circle", { cx:56, cy:52, r:4.6, fill:"#5BD08C" }),
    h("text", { x:90, y:52, fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:35, fontWeight:800, letterSpacing:-1.6, fill:"#241D18" }, "just4kidz")
  );
}

function LogoMark() {
  return h("svg", { width:32, height:32, viewBox:"0 0 96 96", fill:"none", "aria-label":"just4kidz" },
    h("rect", { width:96, height:96, rx:26, fill:"#FB8B3D" }),
    h("circle", { cx:33, cy:37, r:13, fill:"#fff" }),
    h("circle", { cx:55, cy:51, r:9.5, fill:"#F6A623" }),
    h("circle", { cx:72, cy:63, r:6.5, fill:"#5BD08C" })
  );
}

// ── SideNav ───────────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { key:"discover", label:"Discover",  icon:"map" },
  { key:"week",     label:"This week", icon:"calendar" },
  { key:"saved",    label:"Saved",     icon:"bookmark" },
  { key:"friends",  label:"Friends",   icon:"users" },
  { key:"settings", label:"Settings",  icon:"sliders" },
];

function SideNav({ activeNav, onNav, collapsed, onToggle }) {
  return h("aside", { className:`sidenav ${collapsed ? "collapsed" : "expanded"}` },
    h("div", { className:"nav-header" },
      collapsed ? h(LogoMark) : h(LogoLockup),
      h("button", { className:"toggle-btn", onClick:onToggle, "aria-label": collapsed ? "Expand sidebar" : "Collapse sidebar" },
        collapsed ? "›" : "‹"
      )
    ),
    h("nav", { className:"nav-items" },
      NAV_ITEMS.map(({ key, label, icon }) => {
        const active = key === activeNav;
        return h("button", {
          key,
          className: `nav-btn ${active ? "active" : ""}`,
          onClick: () => onNav(key),
          title: label,
        },
          h(Icon, { name:icon, size:20, sw: active ? 2.5 : 2.1, color: active ? "var(--color-primary)" : "var(--text-subtle)" }),
          !collapsed && label
        );
      })
    ),
    h("div", { style:{ marginTop:"auto" } },
      collapsed
        ? h("div", { style:{ display:"flex", justifyContent:"center" } }, h(Avatar, { name:FRIENDS[0].name }))
        : h("div", { className:"friends-box" },
            h("div", { className:"friends-label" }, "Westboro Parents"),
            h("div", { className:"friends-row" },
              FRIENDS.slice(0, 4).map((f, i) =>
                h("div", { key:f.name, style:{ marginLeft: i ? -10 : 0 } }, h(Avatar, { name:f.name }))
              ),
              h("span", { style:{ marginLeft:8, fontSize:12.5, fontWeight:700, color:"var(--text-muted)" } }, "+8")
            )
          )
    )
  );
}

// ── ActivityCard ──────────────────────────────────────────────────────────────
function ActivityCard({ activity, selected, onClick }) {
  const { title, place, category, distance, age, day, time, price, status, spotsLeft } = activity;
  return h("div", {
    className: `activity-card ${selected ? "selected" : ""}`,
    onClick,
    role:"button", tabIndex:0,
    onKeyDown: e => (e.key === "Enter" || e.key === " ") && onClick(),
  },
    h("div", { className:"card-top" },
      h(CatTag, { category }),
      h(AvailPill, { status, spotsLeft })
    ),
    h("div", { className:"card-title" }, title),
    h("div", { className:"card-meta" },
      h("span", { className:"meta-item" }, h(Icon, { name:"map-pin", size:13, sw:2.2, color:"var(--text-subtle)" }), place),
      h("span", { className:"meta-item" },
        h(Icon, { name:"clock", size:13, sw:2.2, color:"var(--text-subtle)" }),
        h("span", { style:{ fontFamily:"var(--font-mono)", fontWeight:500 } }, `${day} ${time}`)
      ),
      h("span", { className:"meta-item" }, h(Icon, { name:"users", size:13, sw:2.2, color:"var(--text-subtle)" }), age),
      h("span", { className:"card-price" }, price)
    )
  );
}

// ── MapPin ────────────────────────────────────────────────────────────────────
function MapPin({ activity, selected, onSelect }) {
  const { id, x, y, category, price, status } = activity;
  const color = CAT_COLOR[category] || "#888";
  const catIconName = { sports:"activity", arts:"palette", music:"music", outdoor:"leaf", water:"droplet", learn:"check" }[category];
  const muted = status === "full" || status === "closed";

  return h("button", {
    onClick: () => onSelect(id),
    style: {
      position:"absolute", left:`${x}%`, top:`${y}%`,
      transform:`translate(-50%,-100%) scale(${selected ? 1.12 : 1})`,
      transformOrigin:"bottom center", border:"none", background:"transparent",
      cursor:"pointer", padding:0, zIndex: selected ? 5 : muted ? 1 : 2,
      transition:"transform var(--dur-base) var(--ease-spring)",
      filter: muted && !selected ? "grayscale(.5)" : "none",
    },
  },
    h("div", {
      style: {
        display:"flex", alignItems:"center", gap:5,
        padding: selected ? "5px 11px 5px 6px" : "4px",
        borderRadius:"var(--radius-pill)",
        background: selected ? color : "var(--surface-card)",
        color: selected ? "#fff" : color,
        boxShadow: selected ? "var(--shadow-lg)" : "var(--shadow-md)",
        border: selected ? "none" : "1.5px solid #fff",
        opacity: muted && !selected ? 0.85 : 1,
        transition:"all var(--dur-base) var(--ease-out)",
      },
    },
      h("span", {
        style: {
          width:26, height:26, borderRadius:"50%", flexShrink:0,
          display:"flex", alignItems:"center", justifyContent:"center",
          background: selected ? "rgba(255,255,255,.22)" : color,
        },
      }, h(Icon, { name: catIconName || "check", size:15, sw:2.4, color:"#fff" })),
      selected && h("span", { style:{ fontSize:12.5, fontWeight:800, fontFamily:"var(--font-mono)" } }, price)
    ),
    h("div", {
      style: {
        width:2, height: selected ? 10 : 7,
        background: selected ? color : "#fff",
        margin:"0 auto", borderRadius:2,
      },
    })
  );
}

// ── MapView ───────────────────────────────────────────────────────────────────
const MAP_BLOCKS = [[20,14,16,12],[44,12,14,14],[64,18,12,10],[20,30,12,14],[50,34,12,12],[34,60,14,12],[58,58,14,14]];

function MapView({ activities, selectedId, onSelect }) {
  return h("div", { style:{ position:"absolute", inset:0, background:"#EDE6D8", overflow:"hidden" } },
    // parks
    h("div", { style:{ position:"absolute", left:"8%",  top:"52%", width:"32%", height:"40%", background:"#D6E8C9", borderRadius:40 } }),
    h("div", { style:{ position:"absolute", right:"6%", top:"8%",  width:"26%", height:"26%", background:"#D6E8C9", borderRadius:36 } }),
    // water
    h("div", { style:{ position:"absolute", right:"-6%", bottom:"-8%", width:"46%", height:"42%", background:"#BFE0EC", borderRadius:"50% 50% 0 0", transform:"rotate(-12deg)" } }),
    // blocks
    ...MAP_BLOCKS.map((b, i) =>
      h("div", { key:i, style:{ position:"absolute", left:`${b[0]}%`, top:`${b[1]}%`, width:`${b[2]}%`, height:`${b[3]}%`, background:"#F6F1E7", borderRadius:10, boxShadow:"inset 0 0 0 1px rgba(74,47,24,.05)" } })
    ),
    // roads
    h("div", { style:{ position:"absolute", left:0, right:0, top:"46%",  height:14, background:"#FBF8F1" } }),
    h("div", { style:{ position:"absolute", top:0, bottom:0, left:"42%",  width:13, background:"#FBF8F1" } }),
    h("div", { style:{ position:"absolute", left:0, right:0, top:"27%",  height:8,  background:"#FBF8F1", opacity:.8 } }),
    h("div", { style:{ position:"absolute", top:0, bottom:0, left:"70%", width:8,  background:"#FBF8F1", opacity:.8 } }),
    // you are here
    h("div", { style:{ position:"absolute", left:"46%", top:"48%", transform:"translate(-50%,-50%)" } },
      h("div", { style:{ width:18, height:18, borderRadius:"50%", background:"var(--sky-400)", boxShadow:"0 0 0 4px rgba(46,155,201,.25),0 0 0 9px rgba(46,155,201,.12)" } })
    ),
    // pins
    ...activities.map(a =>
      h(MapPin, { key:a.id, activity:a, selected:a.id === selectedId, onSelect })
    )
  );
}

// ── DetailPopover ─────────────────────────────────────────────────────────────
function DetailPopover({ activity, saved, onSave }) {
  if (!activity) return null;
  const { title, place, distance, category, age, day, time, price, status, spotsLeft } = activity;
  return h("div", { className:"map-popover" },
    h("div", { className:"pop-top" },
      h(CatTag, { category }),
      h("span", { style:{ marginLeft:"auto" } }, h(AvailPill, { status, spotsLeft }))
    ),
    h("div", { className:"pop-title" }, title),
    h("div", { className:"pop-loc" },
      h(Icon, { name:"map-pin", size:14, sw:2.2, color:"var(--text-subtle)" }),
      place,
      h("span", { style:{ fontFamily:"var(--font-mono)", fontWeight:500, color:"var(--text-subtle)", marginLeft:4 } }, `· ${distance}`)
    ),
    h("div", { className:"pop-meta" },
      h("span", { className:"meta-item" }, h(Icon, { name:"users", size:13, sw:2.2, color:"var(--text-subtle)" }), age),
      h("span", { className:"meta-item" },
        h(Icon, { name:"clock", size:13, sw:2.2, color:"var(--text-subtle)" }),
        h("span", { style:{ fontFamily:"var(--font-mono)", fontWeight:500 } }, `${day} ${time}`)
      ),
      h("span", { style:{ marginLeft:"auto", fontFamily:"var(--font-mono)", fontWeight:500, fontSize:15, color:"var(--text-strong)" } }, price)
    ),
    h("div", { className:"pop-actions" },
      h("button", { className:"btn btn-primary btn-sm btn-full" }, "View details"),
      h("button", { className:"btn-soft", onClick:onSave, title:"Save",
        style:{ background: saved ? "var(--color-primary-soft)" : undefined } },
        h(Icon, { name:"heart", size:16, sw: saved ? 0 : 2,
          color: saved ? "var(--color-primary)" : "currentColor",
          style: saved ? { fill:"var(--color-primary)" } : {} })
      )
    )
  );
}

// ── AddActivityModal ──────────────────────────────────────────────────────────
const CATEGORY_OPTIONS = ["sports","arts","music","outdoor","water","learn"];

function AddActivityModal({ onClose, onAdd }) {
  const [form, setForm] = useState({ name:"", phone:"", activity:"", date:"", age:"", location:"", link:"" });

  function set(key, val) { setForm(f => ({ ...f, [key]: val })); }

  function handleSubmit(e) {
    e.preventDefault();
    if (!form.name.trim() || !form.activity.trim()) return;
    onAdd(form);
    onClose();
  }

  return h("div", { className:"modal-overlay", onClick: e => e.target === e.currentTarget && onClose() },
    h("div", { className:"modal", role:"dialog", "aria-modal":"true", "aria-labelledby":"modal-title" },
      h("div", { className:"modal-header" },
        h("div", { id:"modal-title", className:"modal-title" }, "Add an activity"),
        h("button", { className:"modal-close", onClick:onClose, "aria-label":"Close" }, "×")
      ),
      h("form", { className:"modal-body", onSubmit:handleSubmit },
        h("div", { className:"form-row" },
          h("div", { className:"field" },
            h("label", null, "Your name"),
            h("input", { type:"text", placeholder:"e.g. Jordan Bell", value:form.name, onChange:e=>set("name",e.target.value), required:true })
          ),
          h("div", { className:"field" },
            h("label", null, "Phone number"),
            h("input", { type:"tel", placeholder:"e.g. 613-555-0100", value:form.phone, onChange:e=>set("phone",e.target.value) })
          )
        ),
        h("div", { className:"form-row" },
          h("div", { className:"field" },
            h("label", null, "Activity"),
            h("select", { value:form.activity, onChange:e=>set("activity",e.target.value), required:true },
              h("option", { value:"", disabled:true }, "Choose category…"),
              CATEGORY_OPTIONS.map(c => h("option", { key:c, value:c }, CAT_LABEL[c] || c))
            )
          ),
          h("div", { className:"field" },
            h("label", null, "Date"),
            h("input", { type:"date", value:form.date, onChange:e=>set("date",e.target.value) })
          )
        ),
        h("div", { className:"form-row" },
          h("div", { className:"field" },
            h("label", null, "Age range"),
            h("input", { type:"text", placeholder:"e.g. Ages 3–6", value:form.age, onChange:e=>set("age",e.target.value) })
          ),
          h("div", { className:"field" },
            h("label", null, "Location"),
            h("input", { type:"text", placeholder:"e.g. Riverside Community Centre", value:form.location, onChange:e=>set("location",e.target.value) })
          )
        ),
        h("div", { className:"field" },
          h("label", null, "Link (optional)"),
          h("input", { type:"url", placeholder:"https://…", value:form.link, onChange:e=>set("link",e.target.value) })
        ),
        h("div", { className:"modal-footer", style:{padding:"8px 0 0"} },
          h("button", { type:"button", className:"btn-ghost", onClick:onClose }, "Cancel"),
          h("button", { type:"submit", className:"btn btn-primary" },
            h(Icon, { name:"zap", size:15, sw:2.4, color:"#fff" }),
            "Add activity"
          )
        )
      )
    )
  );
}

// ── Dashboard (root) ──────────────────────────────────────────────────────────
const FILTER_CHIPS = [
  { key:"open",    label:"Open now", icon:"check" },
  { key:"sports",  label:"Sports",   icon:"activity" },
  { key:"arts",    label:"Arts",     icon:"palette" },
  { key:"outdoor", label:"Outdoor",  icon:"leaf" },
  { key:"music",   label:"Music",    icon:"music" },
  { key:"water",   label:"Water",    icon:"droplet" },
];

function Dashboard() {
  const [activeNav,  setActiveNav]  = useState("discover");
  const [collapsed,  setCollapsed]  = useState(false);
  const [filter,     setFilter]     = useState(null);
  const [selectedId, setSelectedId] = useState("forest");
  const [saved,      setSaved]      = useState(() => new Set(["art"]));
  const [showModal,  setShowModal]  = useState(false);
  const [toast,      setToast]      = useState(null);

  function handleAdd(form) {
    const label = CAT_LABEL[form.activity] || form.activity;
    setToast(`"${label}" added successfully!`);
    setTimeout(() => setToast(null), 3000);
  }

  const filteredList = useMemo(() => {
    if (filter === "open") return ACTIVITIES.filter(a => a.status === "open" || a.status === "filling");
    if (filter)            return ACTIVITIES.filter(a => a.category === filter);
    return ACTIVITIES;
  }, [filter]);

  const selectedActivity = useMemo(() => ACTIVITIES.find(a => a.id === selectedId), [selectedId]);

  const toggleFilter = useCallback(key => setFilter(f => f === key ? null : key), []);
  const toggleSaved  = useCallback(() => setSaved(s => {
    const next = new Set(s);
    next.has(selectedId) ? next.delete(selectedId) : next.add(selectedId);
    return next;
  }), [selectedId]);

  return h("div", null,
    showModal && h(AddActivityModal, { onClose:() => setShowModal(false), onAdd:handleAdd }),
    toast && h("div", { className:"toast" }, toast),
    h("div", { className:"app" },
    h(SideNav, { activeNav, onNav:setActiveNav, collapsed, onToggle:() => setCollapsed(c => !c) }),

    h("div", { className:"main" },
      // Header
      h("header", { className:"app-header" },
        h("div", null,
          h("div", { className:"header-title" }, "Discover near Westboro"),
          h("div", { className:"header-sub" }, "Live openings on the map — tap a pin to see details")
        ),
        h("div", { className:"header-right" },
          h("div", { className:"search-bar" },
            h(Icon, { name:"search", size:18, sw:2.2, color:"var(--text-subtle)" }),
            h("span", null, "Search activities & places")
          ),
          h("button", { className:"btn btn-primary", onClick:() => setShowModal(true) },
            h(Icon, { name:"zap", size:16, sw:2.4, color:"#fff" }),
            "Add activity"
          ),
          h(Avatar, { name:"Jordan Bell", size:"md" })
        )
      ),

      // Body
      h("div", { className:"body" },
        // Results list
        h("div", { className:"results-panel" },
          h("div", { className:"results-header" },
            h("span", { className:"results-count" }, `${filteredList.length} spots near you`),
            h("button", { className:"sort-btn" }, "Closest first ▾")
          ),
          h("div", { className:"results-list" },
            filteredList.map(activity =>
              h(ActivityCard, {
                key: activity.id,
                activity,
                selected: activity.id === selectedId,
                onClick: () => setSelectedId(activity.id),
              })
            )
          )
        ),

        // Map
        h("div", { className:"map-pane" },
          h(MapView, { activities:filteredList, selectedId, onSelect:setSelectedId }),

          // Filter chips
          h("div", { className:"map-chips" },
            FILTER_CHIPS.map(({ key, label, icon }) =>
              h("button", {
                key,
                className: `filter-chip ${filter === key ? "active" : ""}`,
                onClick: () => toggleFilter(key),
              },
                h(Icon, { name:icon, size:14, sw:2.2, color: filter === key ? "#fff" : "var(--text-muted)" }),
                label
              )
            )
          ),

          // Locate button
          h("div", { className:"map-locate" },
            h("button", { className:"btn-surface", title:"Locate me" },
              h(Icon, { name:"navigation", size:18, sw:2.2, color:"var(--text-body)" })
            )
          ),

          // Detail popover
          selectedActivity && h(DetailPopover, {
            key: selectedId,
            activity: selectedActivity,
            saved: saved.has(selectedId),
            onSave: toggleSaved,
          })
        )
      )
    )
  )); // close .app and outer wrapper
}

// ── Mount ─────────────────────────────────────────────────────────────────────
createRoot(document.getElementById("root")).render(h(Dashboard));
</script>
</body>
</html>
